services:
  db:
    image: mysql:8.0
    container_name: wetech_db
    restart: always
    environment:
      MYSQL_DATABASE: wetech_db
      MYSQL_ROOT_PASSWORD: 123456
    ports:
      - "33061:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: .
    container_name: wetech_backend
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db
    env_file:
      - .env
    environment:
      # Override SPRING_DATASOURCE_URL to use the 'db' service instead of 'localhost'
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/wetech_db?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC

volumes:
  db_data:
